<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>cell-defense</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;touch-action:none;}
html,body{width:100%;height:100%;background:#050a14;overflow:hidden;font-family:'Orbitron',monospace;user-select:none;}
#wrap{position:relative;width:100%;height:100%;display:flex;justify-content:center;}
canvas{display:block;touch-action:none;background: radial-gradient(circle, #0a1a30 0%, #050a14 100%);}

/* UI 樣式 */
#hud{position:absolute;top:0;left:0;right:0;pointer-events:none;z-index:10;display:flex;justify-content:space-between;padding:10px 15px;background:linear-gradient(180deg,rgba(0,0,0,0.6)0%,transparent 100%);}
.stat{display:flex;flex-direction:column;align-items:center;}
.slabel{font-size:8px;color:#446688;letter-spacing:1px;}
.sval{font-size:16px;font-weight:700;color:#00f2ff;text-shadow:0 0 10px rgba(0,242,255,0.5);}
#hpBar{position:absolute;top:50px;left:15px;right:15px;height:4px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden;}
#hpFill{height:100%;background:#00ff88;box-shadow:0 0 10px #00ff88;transition:width .3s;}

#upgScreen{position:fixed;inset:0;background:rgba(5,10,20,0.95);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(10px);}
#upgCards{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;padding:20px;}
.ucard{background:#0a1a30;border:2px solid #00f2ff;border-radius:12px;padding:20px;width:160px;cursor:pointer;text-align:center;transition:0.2s;}
.ucard:hover{transform:translateY(-5px);box-shadow:0 0 20px #00f2ff;}
.u-icon{font-size:30px;margin-bottom:10px;}
.u-name{font-size:12px;color:#00f2ff;margin-bottom:8px;}
.u-desc{font-size:10px;color:#aabbcc;line-height:1.4;}

#overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;}
.ov-btn{background:transparent;border:2px solid #00f2ff;color:#00f2ff;padding:15px 40px;font-family:'Orbitron';cursor:pointer;font-size:18px;border-radius:30px;transition:0.3s;}
.ov-btn:hover{background:#00f2ff;color:#000;}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="hud">
    <div class="stat"><div class="slabel">SCORE</div><div class="sval" id="hScore">0</div></div>
    <div class="stat"><div class="slabel">ENEMIES</div><div class="sval" id="hKills" style="color:#ff4466">0</div></div>
    <div class="stat"><div class="slabel">WAVE</div><div class="sval" id="hWave" style="color:#ffcc00">1</div></div>
  </div>
  <div id="hpBar"><div id="hpFill" style="width:100%"></div></div>
</div>

<div id="upgScreen">
  <h2 style="color:#fff;margin-bottom:10px;">Evolution Ready</h2>
  <div id="upgCards"></div>
</div>

<div id="overlay" id="startMenu">
  <h1 style="color:#00f2ff;margin-bottom:20px;letter-spacing:5px;">CELL DEFENSE</h1>
  <p style="color:#446688;margin-bottom:30px;text-align:center;">阻止病毒入侵核心<br>左右滑動以移動免疫細胞</p>
  <button class="ov-btn" onclick="startGame()">INITIALIZE</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, G, SN;
let started = false;
let loopStarted = false;

// 基礎參數
const SEG_R = 16;
const SEG_GAP = 35;
const ROW_H = 55;

function resize() {
  W = canvas.width = Math.min(window.innerWidth, 480);
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// ─── 敵人路徑生成 ───
let pathPts = [];
function buildPath() {
  pathPts = [];
  let curY = -100;
  const steps = 15;
  // 入場直線
  for(let i=0; i<steps; i++) pathPts.push({x: W/2, y: curY + (i*(100/steps))});
  curY = 0;
  // S型路徑
  for(let row=0; row<20; row++) {
    let side = (row % 2 === 0);
    let x0 = side ? 40 : W-40;
    let x1 = side ? W-40 : 40;
    for(let i=0; i<=steps; i++) pathPts.push({x: x0 + (x1-x0)*(i/steps), y: curY});
    for(let i=0; i<=5; i++) pathPts.push({x: x1, y: curY + (i*(ROW_H/5))});
    curY += ROW_H;
  }
}

function getPathPos(dist) {
  const idx = Math.max(0, Math.min(pathPts.length - 1, Math.floor(dist / 5)));
  return pathPts[idx];
}

// ─── 遊戲初始化 ───
function resetGame() {
  G = {
    score: 0, kills: 0, wave: 1,
    player: { x: W/2, y: H-80, r: 20, hp: 100, dmg: 25, bSpeed: 8, fireRate: 15, cooldown: 0 },
    bullets: [], enemies: [], particles: [], upgradeQueue: 0,
    paused: false, running: true, frame: 0
  };
  SN = { headDist: 0, speed: 1.2, segs: [] };
  for(let i=0; i<50; i++) spawnEnemy(i);
  buildPath();
}

function spawnEnemy(i) {
  SN.segs.push({
    id: i,
    hp: 50 + (G.wave * 10),
    maxHp: 50 + (G.wave * 10),
    flicker: 0
  });
}

function startGame() {
  document.getElementById('overlay').style.display = 'none';
  resetGame();
  started = true;
  if(!loopStarted) {
    loopStarted = true;
    requestAnimationFrame(loop);
  }
}

// ─── 核心迴圈 ───
let lastT = 0;
function loop(t) {
  if(!lastT) lastT = t;
  const dt = Math.min(t - lastT, 100); // 防止離線過久崩潰
  lastT = t;

  if(G.running && !G.paused) {
    update();
  }
  draw();
  requestAnimationFrame(loop);
}

function update() {
  G.frame++;
  const p = G.player;

  // 病毒移動
  SN.headDist += SN.speed;
  if(SN.headDist > pathPts.length * 5) SN.headDist = 0;

  // 自動射擊
  if(p.cooldown > 0) p.cooldown--;
  else {
    G.bullets.push({x: p.x, y: p.y - 20, vy: -p.bSpeed});
    p.cooldown = p.fireRate;
  }

  // 子彈邏輯
  for(let i=G.bullets.length-1; i>=0; i--) {
    let b = G.bullets[i];
    b.y += b.vy;
    if(b.y < -20) { G.bullets.splice(i, 1); continue; }

    // 碰撞偵測
    for(let j=0; j<SN.segs.length; j++) {
      let s = SN.segs[j];
      let pos = getPathPos(SN.headDist - j * SEG_GAP);
      if(!pos) continue;
      let dx = b.x - pos.x, dy = b.y - pos.y;
      if(Math.sqrt(dx*dx + dy*dy) < SEG_R + 5) {
        s.hp -= p.dmg;
        s.flicker = 5;
        G.bullets.splice(i, 1);
        if(s.hp <= 0) {
          SN.segs.splice(j, 1);
          G.kills++;
          G.score += 10;
          spawnEnemy(G.frame);
          if(G.kills % 20 === 0) triggerUpgrade();
        }
        break;
      }
    }
  }

  // 玩家移動 (觸控/滑鼠)
  canvas.ontouchmove = (e) => {
    let rect = canvas.getBoundingClientRect();
    p.x = e.touches[0].clientX - rect.left;
  };
  
  // 更新 UI
  document.getElementById('hScore').innerText = G.score;
  document.getElementById('hKills').innerText = G.kills;
  document.getElementById('hpFill').style.width = p.hp + '%';
}

function triggerUpgrade() {
  G.paused = true;
  const upgScreen = document.getElementById('upgScreen');
  const cardArea = document.getElementById('upgCards');
  cardArea.innerHTML = '';
  
  const options = [
    {n: '火力強化', d: '提升攻擊傷害', f: () => G.player.dmg += 10, i: '💉'},
    {n: '快速代謝', d: '提升射擊速度', f: () => G.player.fireRate = Math.max(5, G.player.fireRate - 2), i: '⚡'},
    {n: '擴張核心', d: '子彈飛行速度加快', f: () => G.player.bSpeed += 2, i: '🧬'}
  ];

  options.forEach(opt => {
    let div = document.createElement('div');
    div.className = 'ucard';
    div.innerHTML = `<div class="u-icon">${opt.i}</div><div class="u-name">${opt.n}</div><div class="u-desc">${opt.d}</div>`;
    div.onclick = () => {
      opt.f();
      G.paused = false;
      upgScreen.style.display = 'none';
    };
    cardArea.appendChild(div);
  });
  upgScreen.style.display = 'flex';
}

// ─── 繪製邏輯 ───
function draw() {
  ctx.clearRect(0, 0, W, H);

  // 繪製路徑 (背景微光)
  ctx.strokeStyle = 'rgba(0, 242, 255, 0.05)';
  ctx.lineWidth = 20;
  ctx.beginPath();
  pathPts.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
  ctx.stroke();

  // 繪製敵人
  SN.segs.forEach((s, i) => {
    let pos = getPathPos(SN.headDist - i * SEG_GAP);
    if(!pos || pos.y < -20 || pos.y > H + 20) return;

    ctx.save();
    ctx.translate(pos.x, pos.y);
    
    // 敵人主體
    ctx.fillStyle = s.flicker > 0 ? '#fff' : `hsl(${340 - i}, 70%, 50%)`;
    if(s.flicker > 0) s.flicker--;
    
    ctx.beginPath();
    ctx.arc(0, 0, SEG_R, 0, Math.PI * 2);
    ctx.fill();
    
    // 血條
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(-10, -22, 20, 3);
    ctx.fillStyle = '#ff4466';
    ctx.fillRect(-10, -22, (s.hp / s.maxHp) * 20, 3);
    
    ctx.restore();
  });

  // 繪製子彈
  ctx.fillStyle = '#00f2ff';
  G.bullets.forEach(b => {
    ctx.shadowBlur = 10;
    ctx.shadowColor = '#00f2ff';
    ctx.beginPath();
    ctx.arc(b.x, b.y, 4, 0, Math.PI*2);
    ctx.fill();
  });

  // 繪製玩家 (免疫細胞)
  let p = G.player;
  ctx.save();
  ctx.shadowBlur = 20;
  ctx.shadowColor = '#00ff88';
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
  ctx.fill();
  // 核心裝飾
  ctx.strokeStyle = '#00ff88';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(p.x, p.y, p.r + 5, 0, Math.PI*2);
  ctx.stroke();
  ctx.restore();
}
</script>
</body>
</html>
