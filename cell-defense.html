<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>武雄歷險記</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;touch-action:none;}
html,body{width:100%;height:100%;background:#060d18;overflow:hidden;
  font-family:'Orbitron',monospace;user-select:none;-webkit-user-select:none;}
#wrap{position:relative;width:100%;height:100%;display:flex;justify-content:center;}
canvas{display:block;touch-action:none;}

#hud{position:absolute;top:0;left:0;right:0;pointer-events:none;z-index:10;
display:flex;justify-content:space-between;align-items:center;
padding:8px 14px;
background:linear-gradient(180deg,rgba(0,0,0,0.82)0%,transparent 100%);}
.stat{display:flex;flex-direction:column;align-items:center;}
.slabel{font-size:7px;color:#334455;letter-spacing:1px;}
.sval{font-size:14px;font-weight:700;color:#e8f4ff;text-shadow:0 0 8px currentColor;min-width:40px;text-align:center;}
#hpBar{position:absolute;top:46px;left:14px;right:14px;height:4px;
background:rgba(255,255,255,0.07);border-radius:3px;overflow:hidden;pointer-events:none;z-index:10;}
#hpFill{height:100%;background:#00ff88;box-shadow:0 0 8px #00ff88;transition:width .2s,background .3s;border-radius:3px;}

/* laser cooldown bar */
#laserBar{position:absolute;top:54px;left:14px;right:14px;height:3px;
background:rgba(255,238,68,0.12);border-radius:3px;pointer-events:none;z-index:10;display:none;}
#laserFill{height:100%;background:#ffee44;box-shadow:0 0 6px #ffee44;border-radius:3px;transition:width .1s;}

#spdPanel{position:absolute;bottom:10px;right:10px;display:flex;align-items:center;gap:5px;
background:rgba(0,0,0,0.6);border:1px solid #1a2a3a;border-radius:8px;
padding:5px 8px;z-index:20;pointer-events:all;}
.spd-label{font-size:8px;color:#334455;letter-spacing:1px;}
.spd-btn{background:rgba(0,212,255,0.07);border:1px solid rgba(0,212,255,0.2);
color:#00d4ff;font-family:‘Orbitron’,monospace;font-size:10px;
padding:5px 10px;cursor:pointer;border-radius:4px;transition:all .15s;
-webkit-tap-highlight-color:transparent;}
.spd-btn.active,.spd-btn:hover{background:rgba(0,212,255,0.25);border-color:#00d4ff;}

/* stat panel bottom-left */
#statPanel{position:absolute;bottom:10px;left:10px;font-size:9px;color:#334466;
line-height:1.8;pointer-events:none;z-index:10;letter-spacing:1px;}
#statPanel span{color:#00aacc;}

/* Upgrade */
#upgScreen{position:fixed;inset:0;background:rgba(0,5,15,0.94);display:none;
flex-direction:column;align-items:center;justify-content:center;
z-index:100;backdrop-filter:blur(6px);}
#upgTitle{font-size:clamp(16px,4vw,24px);font-weight:900;color:#ffcc00;
text-shadow:0 0 20px #ffcc00;letter-spacing:3px;margin-bottom:4px;text-align:center;}
#upgSub{font-size:11px;color:#334455;letter-spacing:1px;margin-bottom:16px;text-align:center;}
#upgCards{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;padding:0 12px;max-width:700px;}
.ucard{background:linear-gradient(135deg,#0a1628,#0d1f3a);border:2px solid #00d4ff;
border-radius:10px;padding:14px 12px;width:clamp(130px,28vw,170px);
cursor:pointer;transition:all .18s;text-align:center;position:relative;overflow:hidden;
-webkit-tap-highlight-color:transparent;}
.ucard::before{content:’’;position:absolute;inset:0;
background:radial-gradient(circle at 50% 0%,rgba(0,212,255,0.1),transparent 70%);}
.ucard:hover,.ucard:active{border-color:#00d4ff;box-shadow:0 0 22px rgba(0,212,255,0.4);transform:translateY(-3px);}
.ucard.laser-card{border-color:#ff44ff;background:linear-gradient(135deg,#1a0028,#2a0040);}
.ucard.laser-card::before{background:radial-gradient(circle at 50% 0%,rgba(255,68,255,0.15),transparent 70%);}
.ucard.laser-card:hover,.ucard.laser-card:active{box-shadow:0 0 22px rgba(255,68,255,0.45);}
.ucard.laser-card .u-name{color:#ff44ff;}
.ucard.fire-card{border-color:#ff6600;background:linear-gradient(135deg,#1a0800,#2a1000);}
.ucard.fire-card::before{background:radial-gradient(circle at 50% 0%,rgba(255,100,0,0.15),transparent 70%);}
.ucard.fire-card:hover,.ucard.fire-card:active{box-shadow:0 0 22px rgba(255,100,0,0.5);}
.ucard.fire-card .u-name{color:#ff8833;}
.u-icon{font-size:28px;margin-bottom:7px;}
.u-name{font-size:10px;font-weight:700;color:#00d4ff;letter-spacing:1px;margin-bottom:5px;}
.u-desc{font-size:10px;color:#aabbd0;line-height:1.5;}
#upgAllHint{margin-top:12px;font-size:11px;color:#ffcc00;text-align:center;opacity:0;transition:opacity .3s;}

/* Overlay */
#overlay{position:fixed;inset:0;background:rgba(0,5,15,0.93);display:flex;
flex-direction:column;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(8px);}
.ov-t{font-size:clamp(22px,6vw,42px);font-weight:900;color:#00d4ff;
text-shadow:0 0 28px #00d4ff;letter-spacing:4px;text-align:center;margin-bottom:10px;}
.ov-s{font-size:clamp(10px,2.5vw,13px);color:#334455;letter-spacing:1px;
text-align:center;line-height:2;margin-bottom:16px;padding:0 20px;}
.ov-stats{font-size:13px;color:#7a9ab8;text-align:center;line-height:2.2;margin-bottom:16px;}
.ov-btn{background:transparent;border:2px solid #00d4ff;color:#00d4ff;
font-family:‘Orbitron’,monospace;font-size:clamp(11px,3vw,15px);letter-spacing:2px;
padding:13px 36px;cursor:pointer;border-radius:6px;transition:all .2s;
-webkit-tap-highlight-color:transparent;}
.ov-btn:hover,.ov-btn:active{background:#00d4ff;color:#000;box-shadow:0 0 22px rgba(0,212,255,0.5);}
/* Pause button */
#pauseBtn{position:absolute;top:8px;left:50%;transform:translateX(-50%);
background:rgba(0,0,0,0.55);border:1px solid #334455;color:#556677;
font-family:‘Orbitron’,monospace;font-size:9px;padding:4px 10px;
cursor:pointer;border-radius:5px;z-index:30;pointer-events:all;letter-spacing:1px;
-webkit-tap-highlight-color:transparent;}
#pauseBtn:hover{border-color:#00d4ff;color:#00d4ff;}
/* Dog death screen */
#dogDeath{position:fixed;inset:0;background:rgba(0,0,0,0.92);display:none;
flex-direction:column;align-items:center;justify-content:center;z-index:300;
backdrop-filter:blur(4px);}
#dogImg{width:min(80vw,340px);height:auto;border-radius:16px;
border:3px solid #ff3355;box-shadow:0 0 40px rgba(255,50,80,0.5);
margin-bottom:16px;object-fit:cover;}
#dogTitle{font-size:clamp(18px,5vw,28px);font-weight:900;color:#ff3355;
text-shadow:0 0 24px #ff3355;letter-spacing:3px;margin-bottom:6px;text-align:center;}
#dogSub{font-size:11px;color:#556677;margin-bottom:20px;text-align:center;letter-spacing:1px;}
.dog-btn{background:transparent;border:2px solid currentColor;
font-family:‘Orbitron’,monospace;font-size:12px;letter-spacing:2px;
padding:11px 28px;cursor:pointer;border-radius:6px;margin:4px;
transition:all .2s;-webkit-tap-highlight-color:transparent;}
#dogYes{color:#00ff88;border-color:#00ff88;}
#dogYes:hover,#dogYes:active{background:#00ff88;color:#000;box-shadow:0 0 18px rgba(0,255,136,0.5);}
#dogNo{color:#ff3355;border-color:#ff3355;}
#dogNo:hover,#dogNo:active{background:#ff3355;color:#fff;box-shadow:0 0 18px rgba(255,50,80,0.5);}
.dog-btns{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
</style>

</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="hud">
    <div class="stat"><div class="slabel">SCORE</div><div class="sval" id="hScore" style="color:#00d4ff">0</div></div>
    <div class="stat"><div class="slabel">LIFE</div><div class="sval" id="hHp" style="color:#00ff88">100</div></div>
    <div class="stat"><div class="slabel">CATS</div><div class="sval" id="hKills" style="color:#cc44ff">0</div></div>
    <div class="stat"><div class="slabel">WAVE</div><div class="sval" id="hWave" style="color:#ffcc00">1</div></div>
  </div>
  <div id="hpBar"><div id="hpFill"></div></div>
  <div id="laserBar"><div id="laserFill" style="width:100%"></div></div>
  <div id="spdPanel">
    <span class="spd-label">SPEED</span>
    <button class="spd-btn active" id="sp1" onclick="setSPD(1)">1×</button>
    <button class="spd-btn" id="sp2" onclick="setSPD(2)">2×</button>
    <button class="spd-btn" id="sp3" onclick="setSPD(3)">3×</button>
  </div>
  <div id="statPanel">
    骨頭：<span id="stBullet">1</span> &nbsp;連發：<span id="stBurst">1</span><br>
    傷害：<span id="stDmg">22</span> &nbsp;撒尿：<span id="stLaser">無</span><br>
    嘔吐：<span id="stFire">無</span> &nbsp;分裂：<span id="stSplit">無</span><br>
    大骨頭：<span id="stBig">無</span><br>
    拉翔：<span id="stCrit">無</span> &nbsp;拉翔：<span id="stCrit">無</span><br>
    拉翔：<span id="stCrit">無</span>
  </div>
</div>

<button id="pauseBtn" onclick="togglePause()">⏸ PAUSE</button>

<div id="dogDeath">
  <div id="dogTitle">💀 武雄陣亡了！</div>
  <img id="dogImg" src="https://i.postimg.cc/5yrQnsrH/IMG-1137.jpg" crossorigin="anonymous" alt="dog"/>
  <div id="dogSub">武雄要繼續冒險嗎？（僅限一次）<br>貓群倒退 50 隻</div>
  <div class="dog-btns">
    <button class="dog-btn" id="dogYes" onclick="doRevive()">✅ 繼續戰鬥！</button>
    <button class="dog-btn" id="dogNo" onclick="noRevive()">❌ 回家睡覺</button>
  </div>
</div>

<div id="upgScreen">
  <div id="upgTitle">🎁 武雄升級！</div>
  <div id="upgSub">選擇一項升級</div>
  <div id="upgCards"></div>
  <div id="upgAllHint">✨ 超級機率！三項全部獲得！</div>
</div>

<div id="overlay">
  <div class="ov-t">🐶 武雄歷險記</div>
  <div class="ov-s">
    貓群 S 形入侵！<br>
    碰到一次就死！前100隻每10隻有寶箱<br>
    可重生一次：貓群倒退50隻
  </div>
  <div class="ov-s" style="font-size:10px;color:#223344;">
    📱 左右滑動移動角色 &nbsp;|&nbsp; 💻 A/D 或左右鍵移動
  </div>
  <button class="ov-btn" onclick="startGame()">▶ 開始作戰</button>
</div>

<script>
// ═══════════════════════════════════════════════
//  武雄歷險記 — 打貓大作戰
// ═══════════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H;

function resize(){
  const vw = window.visualViewport ? window.visualViewport.width : window.innerWidth;
  const vh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
  W = canvas.width  = Math.min(vw, 480);
  H = canvas.height = vh;
  document.getElementById('wrap').style.width = W+'px';
  if(started) buildPath();
}
window.addEventListener('resize', resize);
if(window.visualViewport) window.visualViewport.addEventListener('resize', resize);

let SPD = 1;
function setSPD(s){
  SPD = s;
  [1,2,3].forEach(n => document.getElementById('sp'+n).classList.toggle('active', n===s));
}

// ─── PATH ───
const MARGIN  = 26;
const ROW_H   = 50;
const SEG_R   = 16;
const SEG_GAP = SEG_R*2 + 3;
const PATH_DEN= 3;
// Chest interval: every 10 nodes for first 100, then every 20
function chestInterval(gi){
  return gi < 100 ? 10 : 20;
}
function isChestNode(gi){
  if(gi < 100) return (gi+1) % 10 === 0;
  return (gi+1) % 20 === 0;
}

let pathPts = [];
let pathArc = [];

function buildPath(){
  pathPts = [];
  const rows = Math.ceil((H * 2.2) / ROW_H);
  const firstY = ROW_H * 0.6;
  // Entry straight down
  for(let y = -SEG_R*3; y <= firstY; y += PATH_DEN)
    pathPts.push({x: W/2, y});
  for(let r = 0; r < rows; r++){
    const y0 = firstY + r * ROW_H;
    const y1 = y0 + ROW_H;
    const goRight = (r % 2 === 0);
    const x0 = goRight ? MARGIN : W - MARGIN;
    const x1 = goRight ? W - MARGIN : MARGIN;
    const steps = Math.ceil(Math.abs(x1-x0) / PATH_DEN);
    for(let i = 0; i <= steps; i++){
      const t = i/steps;
      pathPts.push({x: x0+(x1-x0)*t, y: y0});
    }
    const vSteps = Math.ceil((y1-y0) / PATH_DEN);
    for(let i = 1; i <= vSteps; i++){
      pathPts.push({x: x1, y: y0+(y1-y0)*(i/vSteps)});
    }
  }
  pathArc = [0];
  for(let i = 1; i < pathPts.length; i++){
    const dx = pathPts[i].x-pathPts[i-1].x, dy = pathPts[i].y-pathPts[i-1].y;
    pathArc.push(pathArc[i-1]+Math.sqrt(dx*dx+dy*dy));
  }
}

function pathPos(dist){
  if(dist <= 0) return {...pathPts[0]};
  const tot = pathArc[pathArc.length-1];
  if(dist >= tot) return {...pathPts[pathPts.length-1]};
  let lo=0, hi=pathArc.length-1;
  while(lo < hi-1){ const m=(lo+hi)>>1; pathArc[m]<=dist?lo=m:hi=m; }
  const t = (dist-pathArc[lo])/(pathArc[hi]-pathArc[lo]);
  return {
    x: pathPts[lo].x+(pathPts[hi].x-pathPts[lo].x)*t,
    y: pathPts[lo].y+(pathPts[hi].y-pathPts[lo].y)*t,
  };
}

// ─── SNAKE ───
// Each segment has a fixed `slot` (0=head, 1,2,3...).
// headDist = arc distance of slot-0 along path.
// Segment at slot i is at headDist - i*SEG_GAP.
// When a segment dies, all slots above it shift so body stays connected
// (head "retracts" by SEG_GAP for each dead segment that created a gap).

let SN = {};

function segHP(slot, wave){
  return Math.round((30 + slot*5) * (1+(wave-1)*0.3));
}

function snInit(){
  SN = {
    headDist: 0,
    wave: 1,
    speed: 0.55,
    // segments: array of live segment objects, index=slot (0=head)
    // We always maintain a contiguous array — no gaps.
    segs: [],
    totalEverSpawned: 0,  // global index for HP/chest calc
    pendingSpawn: 0,      // how many more to still add to tail
  };
  // Pre-spawn first segments
  for(let i=0;i<60;i++) spawnTailSeg();
}

function spawnTailSeg(){
  const gi = SN.totalEverSpawned;
  const hp = segHP(gi, SN.wave);
  SN.segs.push({
    gi,          // global index (determines HP, chest)
    hp, maxHp: hp,
    dead: false,
    flickerT: 0,
    isChest: isChestNode(gi),
  });
  SN.totalEverSpawned++;
}

function snUpdateFast(){
  // Move head by SPD steps at once (avoids loop overhead at 3x speed)
  SN.headDist += SN.speed * SPD;
  // Spawn segments as needed (same logic as snUpdate)
  const maxNeededSlot = Math.floor((SN.headDist + H*2) / SEG_GAP) + 10;
  while(SN.segs.length < maxNeededSlot){
    spawnTailSeg();
  }
  // Flicker countdown (scale with SPD)
  SN.segs.forEach(s => { if(s.flickerT>0) s.flickerT = Math.max(0, s.flickerT - SPD); });
  // Head past bottom → kill player
  const headPos = pathPos(SN.headDist);
  if(headPos.y > H + SEG_R*3){
    G.player.hp = 0;
    spawnParts(W/2, H-60, '#ff3355', 15);
    updateHUD();
    SN.segs.shift();
    SN.headDist -= SEG_GAP;
    if(SN.headDist < 0) SN.headDist = 0;
  }
}

function snUpdate(){
  const step = SN.speed;
  SN.headDist += step;

  // Keep spawning tail segments so snake is always long enough
  // We want at least enough segs to fill visible area + buffer
  const maxNeededSlot = Math.floor((SN.headDist + H*2) / SEG_GAP) + 10;
  while(SN.segs.length < maxNeededSlot){
    spawnTailSeg();
  }

  // Update flicker
  SN.segs.forEach(s => { if(s.flickerT>0) s.flickerT--; });

  // Check if head (slot 0) has gone past bottom → damage player
  const headPos = pathPos(SN.headDist);
  if(headPos.y > H + SEG_R*3){
    G.player.hp = 0;
    spawnParts(W/2, H-60, '#ff3355', 15);
    updateHUD();
    // Remove head, next seg becomes head (retract by re-indexing)
    SN.segs.shift();
    // Compensate headDist so new head stays in place
    SN.headDist -= SEG_GAP;
    if(SN.headDist < 0) SN.headDist = 0;
  }
}

// Called when segment at slot `slot` is killed.
// All segments with slot <= that one (closer to head) retract by SEG_GAP each.
// We implement this by reducing headDist by SEG_GAP * (slot+1)
// so the head moves back enough to close the gap.
function retractSnake(slot){
  // Remove this segment from array
  SN.segs.splice(slot, 1);
  // Pull head back by SEG_GAP to close the gap
  SN.headDist -= SEG_GAP;
  if(SN.headDist < 0) SN.headDist = 0;
}

// ─── GAME STATE ───
let G = {};
let started = false;

function resetG(){
  G = {
    running:false, paused:false,
    score:0, kills:0,
    player:{
      x: 0, y: 0, r: 20,
      hp:1, maxHp:1, invincible:0,
      moveDir: 0,   // -1, 0, 1
      spd: 4,
      // gun
      bulletCount: 1,
      burstCount:  1,
      splitLevel:    0,     // 0=none, 1=has split
      critLevel:     0,     // 0=locked, 1=unlocked
      critChance:    0.0,   // 0.2 after unlock
      critUpgCount:  0,     // 用力拉翔 taken (max 16)
      bigBoneLevel:  0,
      bigBoneDmgMult:1.0,
      fireRate:    55,
      fireCooldown:0,
      burstQueue:  0,
      burstDelay:  12,
      burstTimer:  0,
      bulletDmg:   22,
      bulletSpd:   9,
      // laser
      laserLevel:  0,   // 0=none, >0 = has laser
      laserDmgBase:80,
      laserDmgMult:1,
      laserDur:    1,   // seconds active
      laserMaxDur: 10,
      laserCooldown:20, // seconds
      laserTimer:  0,   // frames until laser fires (0=ready)
      laserActive: false,
      laserActiveTimer:0,
      // fire bullet
      fireLevel:   0,   // 0=none
      fireDmgMult: 1.0,
      fireRadius:  1.5, // in units of SEG_R, max 4.5
      fireMaxRadius:4.5,
      fireCooldownMax: 600, // 10 seconds at 60fps
      fireAutoTimer: 0,     // counts up; fires when >= fireCooldownMax
    },
    bullets:[],
    fireBalls:[],   // active fire-ball projectiles (before hitting)
    bigBones:[],    // big bone projectiles
    fireZones:[],   // active burning zones on ground
    particles:[],
    chests:[],
    floatTexts:[],
    upgradeQueue:0,
    reviveUsed: false,
    keys:{},
    touchX: null,   // for mobile drag
    frame:0,
    _bigBoneThisWave:false,
  };
}

// ─── UPGRADES ───
function buildUpgradePool(){
  const p = G.player;
  const pool = [];

  // Always available (capped at 10)
  if(p.bulletCount < 10)
    pool.push({
      id:'bullet', icon:'🦴', name:'增加骨頭',
      desc:'每次同時發射骨頭 +1（上限10）',
      cls:'',
      ap: ()=>{ p.bulletCount = Math.min(p.bulletCount+1, 10); }
    });
  if(p.burstCount < 5)
    pool.push({
      id:'burst', icon:'🦴', name:'骨頭連發',
      desc:'連發次數 +1（上限5）',
      cls:'',
      ap: ()=>{ p.burstCount = Math.min(p.burstCount+1, 5); }
    });

  // Bullet damage +10%
  pool.push({
    id:'dmg', icon:'💥', name:'骨頭傷害 +50%',
    desc:`傷害 ${Math.round(p.bulletDmg)} → ${Math.round(p.bulletDmg*1.5)}`,
    cls:'',
    ap: ()=>{ p.bulletDmg = Math.round(p.bulletDmg * 1.5); }
  });

  // Laser
  if(p.laserLevel === 0){
    pool.push({
      id:'laser', icon:'💛', name:'黃狗撒尿',
      desc:'每 20 秒撒一泡尿\n每秒 20 傷害，持續 1 秒',
      cls:'laser-card',
      ap: ()=>{ p.laserLevel=1; p.laserTimer=p.laserCooldown*60; document.getElementById('laserBar').style.display='block'; }
    });
  } else {
    pool.push({
      id:'laserdmg', icon:'💛', name:'撒尿強化：傷害',
      desc:`撒尿傷害 ×1.5（目前 ${Math.round(p.laserDmgBase*p.laserDmgMult)}/s → ${Math.round(p.laserDmgBase*p.laserDmgMult*1.5)}/s）`,
      cls:'laser-card',
      ap: ()=>{ p.laserDmgMult = parseFloat((p.laserDmgMult * 1.5).toFixed(3)); }
    });
    if(p.laserDur < p.laserMaxDur)
      pool.push({
        id:'laserdur', icon:'⏱️', name:'撒尿強化：時長',
        desc:`持續時間 +1 秒（目前 ${p.laserDur}s，上限 ${p.laserMaxDur}s）`,
        cls:'laser-card',
        ap: ()=>{ p.laserDur = Math.min(p.laserDur+1, p.laserMaxDur); }
      });
  }

  // Fire bullet
  if(p.fireLevel === 0){
    pool.push({
      id:'fire', icon:'🤢', name:'嘔吐攻擊',
      desc:'每10秒嘔吐一坨\n擊中後留下嘔吐物（直徑1.5隻）\n每秒20傷害，持續3秒',
      cls:'fire-card',
      ap: ()=>{ p.fireLevel=1; }
    });
  } else {
    if(p.fireRadius < p.fireMaxRadius)
      pool.push({
        id:'firerad', icon:'🤮', name:'嘔吐範圍 +1',
        desc:`嘔吐範圍擴大（目前 ${p.fireRadius.toFixed(1)} 格，上限 4.5 格）`,
        cls:'fire-card',
        ap: ()=>{ p.fireRadius = Math.min(p.fireRadius+1, p.fireMaxRadius); }
      });
    pool.push({
      id:'firedmg', icon:'🌡️', name:'嘔吐傷害 +50%',
      desc:`嘔吐腐蝕傷害提升至當前的1.5倍`,
      cls:'fire-card',
      ap: ()=>{ p.fireDmgMult = parseFloat((p.fireDmgMult * 1.5).toFixed(3)); }
    });
  }

  // Split bullet
  if(p.splitLevel === 0)
    pool.push({
      id:'split', icon:'🔀', name:'分裂骨頭',
      desc:'骨頭首次擊中時分裂為3顆\n側骨傷害為原始的40%，可穿透1次',
      cls:'',
      ap: ()=>{ p.splitLevel=1; }
    });

  // 拉翔（爆擊）
  if(p.critLevel === 0)
    pool.push({
      id:'crit', icon:'💩', name:'拉翔',
      desc:'骨頭攻擊有20%機率爆擊\n爆擊傷害為普通攻擊的2倍',
      cls:'',
      ap: ()=>{ p.critLevel=1; p.critChance=0.20; }
    });
  else if(p.critUpgCount < 16)
    pool.push({
      id:'critup', icon:'💩', name:'用力拉翔',
      desc:`爆擊機率 +5%（目前 ${Math.round(p.critChance*100)}%，最多升16次）`,
      cls:'',
      ap: ()=>{ p.critUpgCount++; p.critChance=parseFloat(Math.min(1.0,p.critChance+0.05).toFixed(2)); }
    });

  // 憋一波大的
  if(p.bigBoneLevel === 0)
    pool.push({
      id:'bigbone', icon:'🦴', name:'憋一波大的',
      desc:'每波射擊3%機率發射大骨頭\n貫穿所有貓咪，傷害=20+骨頭傷害×50%',
      cls:'',
      ap: ()=>{ p.bigBoneLevel=1; }
    });
  else
    pool.push({
      id:'bigbonedmg', icon:'💪', name:'大骨頭強化 +50%',
      desc:`大骨頭傷害 +50%（目前 ${Math.round((20+p.bulletDmg*0.5)*p.bigBoneDmgMult)} → ${Math.round((20+p.bulletDmg*0.5)*p.bigBoneDmgMult*1.5)}）`,
      cls:'',
      ap: ()=>{ p.bigBoneDmgMult=parseFloat((p.bigBoneDmgMult*1.5).toFixed(3)); }
    });

  // Shuffle and return 3
  return pool.sort(()=>Math.random()-0.5).slice(0,3);
}

function showUpgrade(){
  G.paused = true;
  const scr = document.getElementById('upgScreen');
  const ce  = document.getElementById('upgCards');
  const ht  = document.getElementById('upgAllHint');
  const opts= buildUpgradePool(); // already sliced to 3
  const isAll = Math.random()<0.10;
  ht.style.opacity = isAll?'1':'0';
  document.getElementById('upgSub').textContent = isAll
    ? '✨ 超級機率！三項全部獲得！' : '選擇一項升級 — 10% 機率三選全';
  ce.innerHTML='';
  opts.forEach(u=>{
    const d=document.createElement('div');
    d.className='ucard'+(u.cls?' '+u.cls:'');
    d.innerHTML=`<div class="u-icon">${u.icon}</div>
      <div class="u-name">${u.name}</div>
      <div class="u-desc">${u.desc.replace(/\n/g,'<br>')}</div>`;
    d.addEventListener('click',()=>{
      if(isAll){ opts.forEach(x=>x.ap()); addFloat(W/2,H/2,'✨武雄全開！','#ffcc00'); }
      else      { u.ap(); addFloat(W/2,H/2,`+${u.name}`,'#00d4ff'); }
      scr.style.display='none';
      G.upgradeQueue--;
      updateStatPanel();
      if(G.upgradeQueue>0) setTimeout(showUpgrade,300); else G.paused=false;
    });
    ce.appendChild(d);
  });
  scr.style.display='flex';
}

    G.particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-1,r:2+Math.random()*3,life:30+Math.random()*25,color});

// ─── SHOOT ───
function triggerShoot(){
  if(G.player.burstQueue>0) return;
  G.player.burstQueue=G.player.burstCount;
  G.player.burstTimer=0;
  playBoneSfx(); // 每波只播一次
}

function processBurst(){
  const p=G.player;
  if(p.burstQueue<=0) return;
  if(p.burstTimer>0){p.burstTimer--;return;}
  // Spawn bulletCount bullets spread horizontally, all going straight up
  const spread=(p.bulletCount-1)*14;
  for(let i=0;i<p.bulletCount;i++){
    const ox = p.bulletCount>1 ? (-spread/2+i*(spread/(p.bulletCount-1))) : 0;
    G.bullets.push({
      x: p.x+ox, y: p.y-p.r,
      vx: 0, vy: -p.bulletSpd,
      r: 5,
      dmg: p.bulletDmg,
      isCrit: p.critLevel>0 && Math.random()<p.critChance,
      life:300,
      color:'#00d4ff',
      splitLevel: p.splitLevel,
      hasSplit: false,
    });
  }
  // Big bone: 3% chance per burst wave, max 1 per wave
  if(p.bigBoneLevel>0 && !G._bigBoneThisWave && Math.random()<0.03){
    G._bigBoneThisWave=true;
    const bigDmg=Math.round((20+p.bulletDmg*0.5)*p.bigBoneDmgMult);
    G.bigBones.push({
      x:p.x, y:p.y-p.r,
      vy:-7,
      r: SEG_R*1.8,  // visually large
      dmg:bigDmg,
      life:500,
    });
  }
  p.burstQueue--;
  p.burstTimer=p.burstDelay;
  // Reset wave flag when burst queue finishes
  if(p.burstQueue===0) G._bigBoneThisWave=false;
}

// ─── BIG BONE UPDATE ───
function updateBigBones(){
  for(let bi=G.bigBones.length-1;bi>=0;bi--){
    const bb=G.bigBones[bi];
    bb.y+=bb.vy*SPD; bb.life-=SPD;
    if(bb.life<=0||bb.y<-60){G.bigBones.splice(bi,1);continue;}
    // Hit ALL segments in vertical line (full pierce)
    for(let si=SN.segs.length-1;si>=0;si--){
      const seg=SN.segs[si];
      const d=SN.headDist-si*SEG_GAP;
      if(d<0) continue;
      const pos=pathPos(d);
      const dx=bb.x-pos.x, dy=bb.y-pos.y;
      if(Math.sqrt(dx*dx+dy*dy)<bb.r+SEG_R){
        seg.hp-=bb.dmg;
        seg.flickerT=8;
        addFloat(pos.x,pos.y-SEG_R,'💥'+bb.dmg,'#ffcc00');
        if(seg.hp<=0){
          G.kills++;
          G.score+=Math.floor(si/5)+1;
          spawnParts(pos.x,pos.y,'#ffcc00',12);
          if(seg.isChest) G.chests.push({x:pos.x,y:pos.y,r:14,life:500,pulseT:0});
          retractSnake(si);
        }
      }
    }
  }
}

// ─── AUDIO ───
let _ac = null;
function getAC(){
  if(!_ac) _ac = new (window.AudioContext || window.webkitAudioContext)();
  return _ac;
}
function unlockAudio(){
  const ac = getAC();
  if(ac.state === 'suspended'){
    ac.resume().then(()=>{ console.log('Audio unlocked, state:', ac.state); });
  }
}
// Unlock on any touch/click anywhere
document.addEventListener('touchstart', unlockAudio, {once:false});
document.addEventListener('mousedown', unlockAudio, {once:false});

function playLaserSfx(){
  try {
    const ac = getAC();
    if(ac.state === 'suspended'){ ac.resume(); return; }
    const t = ac.currentTime;
    // 電流噪音層
    const buf = ac.createBuffer(1, ac.sampleRate * 0.35, ac.sampleRate);
    const data = buf.getChannelData(0);
    for(let i=0; i<data.length; i++) data[i] = (Math.random()*2-1) * Math.pow(1 - i/data.length, 1.5);
    const src = ac.createBufferSource();
    src.buffer = buf;
    const bp = ac.createBiquadFilter();
    bp.type = 'bandpass'; bp.frequency.value = 1800; bp.Q.value = 3;
    const gain = ac.createGain();
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.55, t + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
    src.connect(bp); bp.connect(gain); gain.connect(ac.destination);
    src.start(t); src.stop(t + 0.36);
    // 掃頻層
    const osc = ac.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(900, t);
    osc.frequency.exponentialRampToValueAtTime(200, t + 0.3);
    const g2 = ac.createGain();
    g2.gain.setValueAtTime(0.18, t);
    g2.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
    osc.connect(g2); g2.connect(ac.destination);
    osc.start(t); osc.stop(t + 0.31);
  } catch(e){ console.error('laserSfx error:', e); }
}

function playBoneSfx(){
  try {
    const ac = getAC();
    if(ac.state==='suspended') return;
    const now = ac.currentTime;
    if(now - (ac._lastBone||0) < 0.5) return;
    ac._lastBone = now;
    const osc = ac.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(180, now);
    osc.frequency.exponentialRampToValueAtTime(60, now + 0.08);
    const gain = ac.createGain();
    gain.gain.setValueAtTime(0.4, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
    osc.connect(gain); gain.connect(ac.destination);
    osc.start(now); osc.stop(now + 0.1);
  } catch(e){}
}

function updateLaser(){
  const p=G.player;
  if(p.laserLevel===0) return;

  if(p.laserActive){
    p.laserActiveTimer-=SPD;
    // Deal damage each frame to all segs in line
    const dmgPerFrame = (p.laserDmgBase * p.laserDmgMult) / 60;
    for(let si=0;si<SN.segs.length;si++){
      const seg=SN.segs[si];
      if(seg.dead) continue;
      const d = SN.headDist - si*SEG_GAP;
      if(d<0) continue;
      const pos=pathPos(d);
      if(pos.y < p.y-p.r && Math.abs(pos.x-p.x) < SEG_R+6){
        seg.hp -= dmgPerFrame;
        seg.flickerT=2;
        if(seg.hp<=0){
          seg.dead=false; // handled in retract
          G.kills++;
          G.score+=Math.floor(si/5)+1;
          spawnParts(pos.x,pos.y,'#ffee44',8);
          if(seg.isChest) G.chests.push({x:pos.x,y:pos.y,r:14,life:500,pulseT:0});
          retractSnake(si);
          si--; // re-check index
        }
      }
    }
    if(p.laserActiveTimer<=0){
      p.laserActive=false;
      p.laserTimer=p.laserCooldown*60;
    }
  } else {
    if(p.laserTimer>0) p.laserTimer--;
    else {
      // Fire laser!
      p.laserActive=true;
      playLaserSfx();
      p.laserActiveTimer=p.laserDur*60;
    }
  }
  updateLaserBar();
}

// ─── FIRE BALLS & ZONES ───
function updateFireBalls(){
  const p = G.player;
  for(let fi=G.fireBalls.length-1;fi>=0;fi--){
    const fb=G.fireBalls[fi];
    fb.y+=fb.vy*SPD; fb.life-=SPD;
    if(fb.life<=0||fb.y<-30){G.fireBalls.splice(fi,1);continue;}
    // Hit first segment
    let hitSeg=false;
    for(let si=0;si<SN.segs.length;si++){
      const seg=SN.segs[si];
      const d=SN.headDist-si*SEG_GAP;
      if(d<0) break;
      const pos=pathPos(d);
      const dx=fb.x-pos.x, dy=fb.y-pos.y;
      if(Math.sqrt(dx*dx+dy*dy)<fb.r+SEG_R){
        // Spawn fire zone at hit location
        const zoneR = p.fireRadius * SEG_R; // radius in px
        G.fireZones.push({
          x:pos.x, y:pos.y,
          r: zoneR,
          life: 180,   // 3 seconds at 60fps
          maxLife: 180,
          dmgMult: p.fireDmgMult,
          pulseT: 0,
          dmgTick: 0,
        });
        G.fireBalls.splice(fi,1);
        hitSeg=true; break;
      }
    }
  }
}

function updateFireZones(){
  const dmgPerTick = 2; // 2 dmg per tick (every 6 frames) = 20 dmg/sec base
  for(let zi=G.fireZones.length-1;zi>=0;zi--){
    const z=G.fireZones[zi];
    z.life-=SPD; z.pulseT+=0.12*SPD; z.dmgTick+=SPD;
    if(z.life<=0){G.fireZones.splice(zi,1);continue;}
    // Deal damage every 6 frames (10× per second)
    if(z.dmgTick>=6){
      z.dmgTick=0;
      const tickDmg = dmgPerTick * z.dmgMult;
      for(let si=0;si<SN.segs.length;si++){
        const seg=SN.segs[si];
        const d=SN.headDist-si*SEG_GAP;
        if(d<0) break;
        const pos=pathPos(d);
        const dx=pos.x-z.x, dy=pos.y-z.y;
        if(Math.sqrt(dx*dx+dy*dy)<z.r+SEG_R*0.5){
          seg.hp-=tickDmg;
          seg.flickerT=3;
          if(seg.hp<=0){
            G.kills++;
            G.score+=Math.floor(si/5)+1;
            spawnParts(pos.x,pos.y,'#44cc00',8);
            if(seg.isChest) G.chests.push({x:pos.x,y:pos.y,r:14,life:500,pulseT:0});
            retractSnake(si);
            si--;
          }
        }
      }
    }
  }
}

// ─── BG ───
const bgStars=Array.from({length:35},()=>({x:Math.random(),y:Math.random(),r:Math.random()*1.2+0.3,b:Math.random()}));
let bgCache=null, bgCacheW=0, bgCacheH=0;
function buildBgCache(){
  bgCacheW=W; bgCacheH=H;
  bgCache=document.createElement('canvas');
  bgCache.width=W; bgCache.height=H;
  const bc=bgCache.getContext('2d');
  const grad=bc.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#060d18'); grad.addColorStop(1,'#0a1525');
  bc.fillStyle=grad; bc.fillRect(0,0,W,H);
  // Sparse grid
  bc.strokeStyle='rgba(0,212,255,0.022)'; bc.lineWidth=1;
  for(let x=0;x<W;x+=60){bc.beginPath();bc.moveTo(x,0);bc.lineTo(x,H);bc.stroke();}
  for(let y=0;y<H;y+=60){bc.beginPath();bc.moveTo(0,y);bc.lineTo(W,y);bc.stroke();}
}
function drawBg(){
  if(!bgCache||bgCacheW!==W||bgCacheH!==H) buildBgCache();
  ctx.drawImage(bgCache,0,0);
  const frame = (G && G.frame) ? G.frame : 0;
  if(frame%2===0){
    bgStars.forEach(s=>{
      const fl=0.25+Math.sin(frame*0.025+s.b*8)*0.3;
      ctx.beginPath();ctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(180,210,255,${fl*0.25})`; ctx.fill();
    });
  }
}

// ─── DRAW PLAYER (武雄 cartoon dog) ───
function drawDog(cx, cy, r){
  ctx.save(); ctx.translate(cx, cy);
  const s = r/22;
  ctx.shadowColor='#ffcc44'; ctx.shadowBlur=16;
  // Body
  ctx.beginPath(); ctx.ellipse(0,4*s,14*s,11*s,0,0,Math.PI*2);
  ctx.fillStyle='#cc8833'; ctx.fill();
  // Head
  ctx.beginPath(); ctx.arc(0,-8*s,13*s,0,Math.PI*2);
  ctx.fillStyle='#ddaa44'; ctx.fill();
  ctx.shadowBlur=0;
  // Floppy ears
  ctx.fillStyle='#bb7722';
  ctx.beginPath(); ctx.ellipse(-11*s,-10*s,5*s,8*s,-0.4,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse( 11*s,-10*s,5*s,8*s, 0.4,0,Math.PI*2); ctx.fill();
  // Snout
  ctx.beginPath(); ctx.ellipse(0,-5*s,7*s,5*s,0,0,Math.PI*2);
  ctx.fillStyle='#eebb66'; ctx.fill();
  // Nose
  ctx.beginPath(); ctx.ellipse(0,-7*s,3*s,2*s,0,0,Math.PI*2);
  ctx.fillStyle='#331100'; ctx.fill();
  // Eyes
  ctx.fillStyle='#221100';
  ctx.beginPath(); ctx.arc(-5*s,-11*s,2.5*s,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc( 5*s,-11*s,2.5*s,0,Math.PI*2); ctx.fill();
  // Eye shine
  ctx.fillStyle='#ffffff';
  ctx.beginPath(); ctx.arc(-4*s,-12*s,s,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc( 6*s,-12*s,s,0,Math.PI*2); ctx.fill();
  // Smile
  ctx.strokeStyle='#331100'; ctx.lineWidth=1.5*s; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-3*s,-3*s); ctx.quadraticCurveTo(0,-1*s,3*s,-3*s); ctx.stroke();
  // Wagging tail
  const wag=Math.sin(Date.now()*0.008)*0.4;
  ctx.strokeStyle='#cc8833'; ctx.lineWidth=3*s;
  ctx.beginPath(); ctx.moveTo(12*s,4*s);
  ctx.quadraticCurveTo(18*s+wag*6,-2*s,16*s+wag*10,-8*s); ctx.stroke();
  ctx.restore();
}

function drawPlayer(){
  const p=G.player;
  if(p.invincible>0&&Math.floor(p.invincible/4)%2===0) return;
  drawDog(p.x, p.y, p.r);
  // Yellow urine laser beam
  if(p.laserActive){
    const prog=1-p.laserActiveTimer/(p.laserDur*60);
    const alpha=0.85-prog*0.3;
    ctx.save();
    ctx.globalAlpha=alpha*0.45;
    ctx.strokeStyle='#ffee44'; ctx.lineWidth=14; ctx.shadowColor='#ffee44'; ctx.shadowBlur=18;
    ctx.beginPath(); ctx.moveTo(p.x,p.y-p.r); ctx.lineTo(p.x,-20); ctx.stroke();
    ctx.globalAlpha=alpha;
    ctx.strokeStyle='#ffffaa'; ctx.lineWidth=3; ctx.shadowBlur=6;
    ctx.beginPath(); ctx.moveTo(p.x,p.y-p.r); ctx.lineTo(p.x,-20); ctx.stroke();
    ctx.restore();
  }
}

// ─── DRAW HELPERS ───
function drawBone(cx, cy, r, col){
  // Horizontal bone: shaft + 4 end-knobs
  const sw=r*1.1, sh=r*0.28, kr=r*0.45;
  ctx.fillStyle=col;
  // Shaft
  ctx.beginPath(); ctx.ellipse(cx,cy,sw,sh,0,0,Math.PI*2); ctx.fill();
  // End knobs
  for(const [ex,ey] of [[-sw,-sh*0.5],[-sw,sh*0.5],[sw,-sh*0.5],[sw,sh*0.5]]){
    ctx.beginPath(); ctx.arc(cx+ex,cy+ey,kr,0,Math.PI*2); ctx.fill();
  }
}

function drawCatFace(cx, cy, r, fillCol, strokeCol){
  ctx.save(); ctx.translate(cx,cy);
  const s=r/16;
  // Head circle
  ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2);
  ctx.fillStyle=fillCol; ctx.fill();
  ctx.strokeStyle=strokeCol; ctx.lineWidth=1.5; ctx.stroke();
  // Ears (triangles)
  ctx.fillStyle=strokeCol;
  ctx.beginPath(); ctx.moveTo(-r*0.55,-r*0.7); ctx.lineTo(-r*0.2,-r*1.1); ctx.lineTo(0,-r*0.7); ctx.fill();
  ctx.beginPath(); ctx.moveTo( r*0.55,-r*0.7); ctx.lineTo( r*0.2,-r*1.1); ctx.lineTo(0,-r*0.7); ctx.fill();
  // Inner ear
  ctx.fillStyle='rgba(255,160,180,0.5)';
  ctx.beginPath(); ctx.moveTo(-r*0.48,-r*0.72); ctx.lineTo(-r*0.24,-r*1.0); ctx.lineTo(-r*0.04,-r*0.72); ctx.fill();
  ctx.beginPath(); ctx.moveTo( r*0.48,-r*0.72); ctx.lineTo( r*0.24,-r*1.0); ctx.lineTo( r*0.04,-r*0.72); ctx.fill();
  // Eyes (almond)
  ctx.fillStyle=strokeCol;
  ctx.beginPath(); ctx.ellipse(-r*0.35,-r*0.15,r*0.22,r*0.16,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse( r*0.35,-r*0.15,r*0.22,r*0.16,0,0,Math.PI*2); ctx.fill();
  // Eye shine
  ctx.fillStyle='#ffffffcc';
  ctx.beginPath(); ctx.arc(-r*0.31,-r*0.18,r*0.07,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc( r*0.39,-r*0.18,r*0.07,0,Math.PI*2); ctx.fill();
  // Nose (small triangle)
  ctx.fillStyle='#ff88aa';
  ctx.beginPath(); ctx.moveTo(0,r*0.12); ctx.lineTo(-r*0.1,r*0.22); ctx.lineTo(r*0.1,r*0.22); ctx.fill();
  // Whiskers
  ctx.strokeStyle=strokeCol; ctx.lineWidth=0.8; ctx.globalAlpha=0.7;
  for(const [x1,y1,x2,y2] of [[-r*0.15,r*0.2,-r*0.75,r*0.1],[-r*0.15,r*0.25,-r*0.75,r*0.28],
                                [ r*0.15,r*0.2, r*0.75,r*0.1],[ r*0.15,r*0.25, r*0.75,r*0.28]]){
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  }
  ctx.globalAlpha=1;
  ctx.restore();
}

// ─── DRAW SNAKE ───
function drawSnake(){
  if(!SN || !SN.segs) return;
  const vis=[];
  for(let si=0;si<SN.segs.length;si++){
    const seg=SN.segs[si];
    const d=SN.headDist-si*SEG_GAP;
    if(d<0) break;
    const pos=pathPos(d);
    if(pos.y < -SEG_R*4) continue;  // above screen, skip but keep going
    if(pos.y > H+SEG_R*4) continue; // below screen, skip
    vis.push({seg,pos,si});
    if(vis.length>200) break;        // hard cap for perf
  }
  if(!vis.length) return;

  // Connectors (tail→head) — no shadow for perf
  ctx.save(); ctx.lineCap='round'; ctx.shadowBlur=0;
  // Batch by similar color to reduce state changes
  for(let i=vis.length-1;i>=1;i--){
    const a=vis[i],b=vis[i-1];
    const t=Math.min(a.si/100,1);
    const r=Math.round(195-t*75), g=Math.round(20+t*10), bl=Math.round(45+t*120);
    ctx.strokeStyle=`rgb(${r},${g},${bl})`;
    ctx.lineWidth=SEG_R*1.1;
    ctx.beginPath(); ctx.moveTo(a.pos.x,a.pos.y); ctx.lineTo(b.pos.x,b.pos.y); ctx.stroke();
  }
  ctx.restore();

  // Cat faces
  for(let i=vis.length-1;i>=0;i--){
    const {seg,pos,si}=vis[i];
    const t=Math.min(si/100,1);
    const flicker=seg.flickerT>0;
    const isHead=(si===0);
    // Color: chest=red, head=lighter, deeper=darker; flicker=white
    const rr=Math.round(220-t*60), gg=Math.round(140-t*100), bb=Math.round(50+t*80);
    let fillCol, strokeCol, glowCol;
    if(flicker){
      fillCol='#ffffff'; strokeCol='#ff4444'; glowCol='#fff';
    } else if(seg.isChest){
      fillCol='#cc1122'; strokeCol='#ff4466'; glowCol='#ff0033';
    } else if(isHead){
      fillCol=`rgb(${rr},${gg},${bb})`; strokeCol='#ffffff'; glowCol='#ffaa00';
    } else {
      fillCol=`rgb(${rr},${gg},${bb})`; strokeCol='rgba(0,0,0,0.55)'; glowCol='#884400';
    }
    ctx.save();
    ctx.shadowColor=glowCol;
    ctx.shadowBlur=seg.isChest?20:isHead?18:8;
    drawCatFace(pos.x, pos.y, SEG_R, fillCol, strokeCol);
    ctx.shadowBlur=0;
    // HP text in center
    const pct=seg.hp/seg.maxHp;
    const hpCol=pct>0.6?'#fff':pct>0.3?'#ffdd44':'#ff4444';
    const hp=Math.ceil(seg.hp);
    let hpStr;
    if(hp>=1000){ hpStr=Math.round(hp/100)/10+'k'; }
    else { hpStr=String(hp); }
    const fs=hpStr.length>=5?5:hpStr.length>=4?6:hpStr.length>=3?7:9;
    ctx.save(); ctx.translate(pos.x,pos.y);
    ctx.font=`bold ${fs}px 'Orbitron',monospace`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle=hpCol;
    ctx.shadowColor='#000'; ctx.shadowBlur=3;
    ctx.fillText(hpStr,0,2);
    ctx.restore();
    // Chest indicator: red glow ring
    if(seg.isChest){
      ctx.save(); ctx.translate(pos.x,pos.y);
      ctx.beginPath(); ctx.arc(0,0,SEG_R+3,0,Math.PI*2);
      ctx.strokeStyle='#ff2244'; ctx.lineWidth=2;
      ctx.shadowColor='#ff0033'; ctx.shadowBlur=10;
      const dashLen = Math.PI*2*(SEG_R+3)/6;
      ctx.setLineDash([dashLen*0.6, dashLen*0.4]);
      ctx.stroke(); ctx.setLineDash([]);
      ctx.restore();
    }
    ctx.restore();
  }
}

// ─── MAIN UPDATE ───
function update(){
  if(!G.running||G.paused) return;
  G.frame++;
  const p=G.player;

  // ── Player move ──
  let dx=0;
  if(G.keys['ArrowLeft']||G.keys['a']||G.keys['A']) dx=-1;
  if(G.keys['ArrowRight']||G.keys['d']||G.keys['D']) dx=1;
  if(dx!==0) p.x=Math.max(p.r,Math.min(W-p.r,p.x+dx*p.spd));
  // (SPD handled by loop calling update() multiple times)

  if(p.invincible>0) p.invincible-=SPD;

  // ── Snake (SPD steps) ──
  snUpdateFast();

  // Wave up every 80 kills
  const newWave=1+Math.floor(G.kills/80);
  if(newWave>SN.wave){SN.wave=newWave;SN.speed=0.55+(SN.wave-1)*0.07;updateHUD();}

  // ── Shoot (speed scales with SPD) ──
  if(p.fireCooldown>0) p.fireCooldown-=SPD;
  if(p.fireCooldown<=0&&SN.segs.length>0){triggerShoot();p.fireCooldown=p.fireRate;}
  processBurst();

  // ── Laser ──
  updateLaser();

  // ── Fire balls & big bones ──
  updateFireAuto();
  updateFireBalls();
  updateFireZones();
  updateBigBones();

  // ── Bullet movement & hit ──
  for(let bi=G.bullets.length-1;bi>=0;bi--){
    const b=G.bullets[bi];
    b.x+=b.vx*SPD; b.y+=b.vy*SPD; b.life-=SPD;
    if(b.life<=0||b.y<-30||b.x<-20||b.x>W+20){G.bullets.splice(bi,1);continue;}
    for(let si=0;si<SN.segs.length;si++){
      const seg=SN.segs[si];
      const d=SN.headDist-si*SEG_GAP;
      if(d<0) break;
      const pos=pathPos(d);
      const dx2=b.x-pos.x, dy2=b.y-pos.y;
      if(Math.sqrt(dx2*dx2+dy2*dy2)<b.r+SEG_R){
        const hitDmg = b.isCrit ? b.dmg*2 : b.dmg;
        seg.hp-=hitDmg;
        seg.flickerT=6;
        addFloat(pos.x,pos.y-SEG_R, b.isCrit?`💩${hitDmg}`:`${hitDmg}`, b.isCrit?'#ffcc00':'#ffffff');
        if(seg.hp<=0){
          G.kills++;
          G.score+=Math.floor(si/5)+1;
          spawnParts(pos.x,pos.y,'#ff3355',10);
          if(seg.isChest) G.chests.push({x:pos.x,y:pos.y,r:14,life:500,pulseT:0});
          retractSnake(si);
          si--;
        }
        // Split bullet: on first hit, spawn 2 side bullets
        if(b.splitLevel>0 && !b.hasSplit){
          b.hasSplit=true;
          const ang30=30*Math.PI/180;
          for(const sign of [-1,1]){
            const vx2=Math.cos(Math.PI/2+sign*ang30)*G.player.bulletSpd;
            const vy2=Math.sin(Math.PI/2+sign*ang30)*G.player.bulletSpd;
            G.bullets.push({
              x:b.x,y:b.y,
              vx:vx2,vy:-Math.abs(vy2),
              r:4, dmg:Math.round(b.dmg*0.4),
              isCrit:false,
              life:200, color:'#ffaa00',
              splitLevel:0, hasSplit:true,
            });
          }
        }
        // Bullet removed after hit (no pierce)
        G.bullets.splice(bi,1);
        break;
      }
    }
  }

  // ── Player-segment collision ──
  if(p.invincible<=0){
    for(let si=0;si<SN.segs.length;si++){
      const seg=SN.segs[si];
      const d=SN.headDist-si*SEG_GAP;
      if(d<0) break;
      const pos=pathPos(d);
      const dx2=pos.x-p.x,dy2=pos.y-p.y;
      if(Math.sqrt(dx2*dx2+dy2*dy2)<SEG_R+p.r*0.75){
        p.hp=0;
        spawnParts(p.x,p.y,'#ff3355',20);
        updateHUD(); break;
      }
    }
  }

  // ── Chests ──
  G.chests=G.chests.filter(c=>{
    c.life-=SPD; c.pulseT+=0.09*SPD; c.y+=0.4*SPD;
    if(c.life<450){
      G.upgradeQueue++;
      spawnParts(c.x,c.y,'#ffcc00',16);
      if(!G.paused) showUpgrade();
      return false;
    }
    return c.life>0;
  });

  // ── Particles/floats ──
  G.particles.forEach(pt=>{pt.x+=pt.vx*SPD;pt.y+=pt.vy*SPD;pt.vy+=0.1*SPD;pt.life-=SPD;});
  G.particles=G.particles.filter(pt=>pt.life>0);
  G.floatTexts.forEach(ft=>{ft.y+=ft.vy*SPD;ft.life-=SPD;});
  G.floatTexts=G.floatTexts.filter(ft=>ft.life>0);

  if(p.hp<=0 && G.running){
    G.running=false;
    setTimeout(()=>{
      if(!G.reviveUsed){
        document.getElementById('dogDeath').style.display='flex';
      } else {
        showGameOver();
      }
    },400);
  }
  if(G.frame%4===0){updateHUD();updateStatPanel();}
}

// ─── DRAW ───
function draw(){
  if(!G || !G.particles) return; // not initialized yet
  drawBg();
  G.particles.forEach(pt=>{
    ctx.save();ctx.globalAlpha=Math.min(pt.life/35,1);
    ctx.shadowColor=pt.color;ctx.shadowBlur=4;
    ctx.beginPath();ctx.arc(pt.x,pt.y,pt.r,0,Math.PI*2);
    ctx.fillStyle=pt.color;ctx.fill();ctx.restore();
  });
  G.chests.forEach(c=>{
    const p=1+Math.sin(c.pulseT)*0.12;
    ctx.save();
    ctx.shadowColor='#ffcc00';ctx.shadowBlur=12+Math.sin(c.pulseT)*6;
    ctx.font=`${c.r*2*p}px serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('📦',c.x,c.y);ctx.restore();
  });
  drawSnake();

  // Fire zones (under bullets, above snake overlay)
  G.fireZones.forEach(z=>{
    const alpha = Math.min(1, z.life/30) * (0.55+Math.sin(z.pulseT)*0.2);
    const rPulse = z.r*(1+Math.sin(z.pulseT*1.3)*0.06);
    ctx.save();
    // Outer glow
    ctx.globalAlpha=alpha*0.35;
    ctx.beginPath();ctx.arc(z.x,z.y,rPulse*1.25,0,Math.PI*2);
    const outerGrad=ctx.createRadialGradient(z.x,z.y,0,z.x,z.y,rPulse*1.25);
    outerGrad.addColorStop(0,'rgba(80,220,60,0.7)');
    outerGrad.addColorStop(1,'rgba(30,160,0,0)');
    ctx.fillStyle=outerGrad; ctx.fill();
    // Inner fire
    ctx.globalAlpha=alpha*0.7;
    ctx.beginPath();ctx.arc(z.x,z.y,rPulse,0,Math.PI*2);
    const inGrad=ctx.createRadialGradient(z.x,z.y,0,z.x,z.y,rPulse);
    inGrad.addColorStop(0,'rgba(180,255,80,0.9)');
    inGrad.addColorStop(0.5,'rgba(80,200,40,0.7)');
    inGrad.addColorStop(1,'rgba(20,100,0,0.2)');
    ctx.fillStyle=inGrad; ctx.fill();
    // Border
    ctx.globalAlpha=alpha*0.5;
    ctx.strokeStyle='#44cc00';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(z.x,z.y,rPulse,0,Math.PI*2);ctx.stroke();
    ctx.restore();
  });

  // Fire balls in flight
  G.fireBalls.forEach(fb=>{
    ctx.save();ctx.translate(fb.x,fb.y);
    ctx.shadowColor='#44cc00';ctx.shadowBlur=18;
    // Flame circle
    const grad=ctx.createRadialGradient(0,0,0,0,0,fb.r);
    grad.addColorStop(0,'rgba(200,255,100,1)');
    grad.addColorStop(0.5,'rgba(80,200,40,0.9)');
    grad.addColorStop(1,'rgba(20,100,0,0.1)');
    ctx.beginPath();ctx.arc(0,0,fb.r,0,Math.PI*2);
    ctx.fillStyle=grad;ctx.fill();
    ctx.restore();
  });
  // Bullets → bones
  G.bullets.forEach(b=>{
    ctx.save(); ctx.translate(b.x,b.y);
    const isSplit=b.color==='#ffaa00';
    ctx.shadowColor=isSplit?'#ffaa00':'#ffffff'; ctx.shadowBlur=8;
    drawBone(0,0,b.r,isSplit?'#ffcc66':'#f0ead6');
    ctx.restore();
  });
  // Big bones
  G.bigBones.forEach(bb=>{
    ctx.save(); ctx.translate(bb.x,bb.y);
    ctx.shadowColor='#ffcc00'; ctx.shadowBlur=22;
    drawBone(0,0,bb.r,'#fffde0');
    ctx.restore();
  });
  if(G.running) drawPlayer();
  G.floatTexts.forEach(ft=>{
    ctx.save();ctx.globalAlpha=ft.life/45;
    ctx.font=`bold ${ft.txt.length>5?10:13}px 'Orbitron',monospace`;
    ctx.textAlign='center';ctx.fillStyle=ft.col;
    ctx.shadowColor=ft.col;ctx.shadowBlur=6;
    ctx.fillText(ft.txt,ft.x,ft.y);ctx.restore();
  });
  // Danger zone line
  ctx.save();
  ctx.strokeStyle='rgba(255,50,50,0.1)';ctx.lineWidth=1;ctx.setLineDash([6,10]);
  ctx.beginPath();ctx.moveTo(0,H-110);ctx.lineTo(W,H-110);ctx.stroke();
  ctx.setLineDash([]);ctx.restore();
}

// ─── GAME CONTROL ───
function togglePause(){
  if(!G.running && !G.paused) return;
  G.paused = !G.paused;
  document.getElementById('pauseBtn').textContent = G.paused ? '▶ RESUME' : '⏸ PAUSE';
}
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'||e.key==='p'||e.key==='P') togglePause();
});

function doRevive(){
  document.getElementById('dogDeath').style.display='none';
  G.reviveUsed = true;
  G.player.hp = 1;
  G.player.invincible = 120;
  // Retract snake 50 nodes
  const retract = 50;
  const remove = Math.min(retract, SN.segs.length);
  SN.segs.splice(0, remove);
  SN.headDist = Math.max(0, SN.headDist - remove * SEG_GAP);
  spawnParts(G.player.x, G.player.y, '#00ff88', 25);
  G.running = true;
  updateHUD();
}

function noRevive(){
  document.getElementById('dogDeath').style.display='none';
  showGameOver();
}

function startGame(){
  // Unlock AudioContext on first user gesture (required on iOS/Android)
  unlockAudio();
  started=true; resize(); buildPath();
  resetG();
  G.player.x=W/2; G.player.y=H-70;
  snInit();
  document.getElementById('overlay').style.display='none';
  G.running=true;
  updateHUD(); updateStatPanel(); updateLaserBar();
  document.getElementById("pauseBtn").textContent="⏸ PAUSE";
  if(!loopStarted){ loopStarted=true; requestAnimationFrame(loop); }
}
function showGameOver(){
  const ov=document.getElementById('overlay');
  ov.innerHTML=`
    <div class="ov-t" style="color:#ff3355;text-shadow:0 0 28px #ff3355">💀 武雄回家了</div>
    <div class="ov-stats">Wave：${SN.wave}<br>打倒貓咪：${G.kills}<br>分數：${G.score}</div>
    <button class="ov-btn" onclick="startGame()">↺ 再次出發！</button>`;
  ov.style.display='flex';
}

let loopStarted = false;
let _lastT = 0, _accum = 0;
const STEP_MS = 1000/60;
function loop(ts){
  requestAnimationFrame(loop);
  try {
    if(_lastT===0) _lastT=ts;
    const raw = Math.min(ts-_lastT, 80);
    _lastT = ts;
    _accum += raw * SPD;
    let steps=0;
    while(_accum >= STEP_MS && steps < 6){
      update();
      _accum -= STEP_MS;
      steps++;
    }
    draw();
  } catch(e) {
    console.error('Loop error:', e);
  }
}
resize();
</script>
